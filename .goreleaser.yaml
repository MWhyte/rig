version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/rig
    binary: rig
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: rig
    repository:
      owner: MWhyte
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/MWhyte/rig
    description: The most beautiful terminal radio CLI
    license: AGPL-3.0-only
    dependencies:
      - name: mpv
    install: |
      bin.install "rig"
