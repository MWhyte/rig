version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/rig
    binary: rig
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^style:"
      - "^refactor:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Other Changes
      order: 999

brews:
  - name: rig
    repository:
      owner: MWhyte
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/MWhyte/rig
    description: The most beautiful terminal radio CLI
    license: AGPL-3.0-only
    dependencies:
      - name: mpv
    install: |
      bin.install "rig"
